<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfolio – a VSCode-themed developer portfolio" />
    <title>Portfolio – Visual Studio Code</title>
  </head>
  <body>
    <div id="app">
      <!-- Title bar (VSCode layout: menus left | search center | layout right) -->
      <div class="titlebar" id="titlebar">
        <!-- Left: mobile toggle + menu items -->
        <div class="titlebar__left">
          <button class="mobile-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div class="menubar" id="menubar" role="menubar"></div>
        </div>

        <!-- Center: command/search bar -->
        <button class="titlebar__search" id="titlebarSearch" aria-label="Search or open command palette">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="titlebar__search-text">Portfolio — Visual Studio Code</span>
          <kbd class="titlebar__search-hint">Ctrl+P</kbd>
        </button>

        <!-- Right: layout split buttons -->
        <div class="titlebar__right">
          <button class="titlebar__layout-btn" id="splitEditorBtn" aria-label="Split editor" title="Split Editor">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
          </button>
          <button class="titlebar__layout-btn" id="togglePanelBtn" aria-label="Toggle panel" title="Toggle Panel">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
          </button>
          <button class="titlebar__layout-btn" id="toggleSidebarBtn" aria-label="Toggle sidebar" title="Toggle Sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
          </button>
        </div>
      </div>

      <!-- Workspace -->
      <div class="workspace">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Activity Bar -->
        <div class="activity-bar" id="activityBar">
          <div class="activity-bar__top">
            <button class="activity-bar__btn is-active" data-panel="explorer" aria-label="Explorer" title="Explorer">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
            </button>
            <button class="activity-bar__btn" data-panel="search" aria-label="Search" title="Search">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <button class="activity-bar__btn" data-panel="git" aria-label="Source Control" title="Source Control">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
            </button>
            <button class="activity-bar__btn" data-panel="extensions" aria-label="Extensions" title="Extensions">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="7" height="7" rx="1"/><rect x="15" y="7" width="7" height="7" rx="1"/><rect x="8.5" y="2" width="7" height="7" rx="1"/><rect x="8.5" y="15" width="7" height="7" rx="1"/></svg>
            </button>
          </div>
          <div class="activity-bar__bottom">
            <button class="activity-bar__btn" data-panel="accounts" aria-label="Accounts" title="Accounts">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </button>
            <button class="activity-bar__btn" data-panel="settings" aria-label="Settings" title="Settings">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="File explorer">
          <!-- Explorer panel (default) -->
          <div class="sidebar__panel is-active" id="panel-explorer">
            <div class="sidebar__explorer" id="fileTree"></div>
            <div class="sidebar__open-editors" id="openEditors">
              <div class="sidebar__section-label">Open Editors</div>
              <div id="openEditorsList"></div>
            </div>
          </div>

          <!-- Search panel -->
          <div class="sidebar__panel" id="panel-search">
            <div class="sidebar__section-label">Search</div>
            <div class="sidebar-search">
              <input class="sidebar-search__input" id="sidebarSearchInput" type="text" placeholder="Search files…" autocomplete="off" spellcheck="false" />
              <div class="sidebar-search__results" id="sidebarSearchResults"></div>
            </div>
          </div>

          <!-- Source Control panel -->
          <div class="sidebar__panel" id="panel-git">
            <div class="sidebar__section-label">Source Control</div>
            <div class="sidebar-placeholder">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
              <p>No changes</p>
            </div>
          </div>

          <!-- Extensions panel (populated by extensions.js) -->
          <div class="sidebar__panel" id="panel-extensions"></div>

          <!-- Accounts panel (bottom popover) -->
          <div class="sidebar__panel" id="panel-accounts">
            <div class="sidebar__section-label">Accounts</div>
            <div class="sidebar-account">
              <div class="sidebar-account__avatar">SK</div>
              <div class="sidebar-account__info">
                <span class="sidebar-account__name">Sushanka Karki</span>
                <span class="sidebar-account__email">karkisushanka719@gmail.com</span>
              </div>
            </div>
          </div>

          <!-- Settings panel -->
          <div class="sidebar__panel" id="panel-settings">
            <div class="sidebar__section-label">Settings</div>
            <div class="sidebar-settings">
              <div class="sidebar-settings__item">
                <span>Theme</span><span class="sidebar-settings__val">Dark+</span>
              </div>
              <div class="sidebar-settings__item">
                <span>Font Size</span><span class="sidebar-settings__val">13px</span>
              </div>
              <div class="sidebar-settings__item">
                <span>Tab Size</span><span class="sidebar-settings__val">2</span>
              </div>
              <div class="sidebar-settings__item">
                <span>Word Wrap</span><span class="sidebar-settings__val">on</span>
              </div>
              <div class="sidebar-settings__item">
                <span>Format on Save</span><span class="sidebar-settings__val">on</span>
              </div>
            </div>
            <div class="sidebar__section-label" style="margin-top:16px;">Admin</div>
            <div class="sidebar-settings">
              <button id="openAdminBtn" class="sidebar-admin-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Contact Messages
                <span id="adminMsgBadge" class="admin-badge" style="display:none;">0</span>
              </button>
            </div>
          </div>
        </aside>

        <!-- Editor area -->
        <main class="editor-area" role="main">
          <div class="editor-columns" id="editorColumns">
            <div class="editor-column" id="editorLeft">
              <div class="tabbar" id="tabBar" role="tablist" aria-label="Open files"></div>
              <nav class="breadcrumb" id="breadcrumb" aria-label="File path"></nav>
              <div class="content-pane" id="contentPane"></div>
            </div>
            <div class="editor-resizer" id="editorResizer"></div>
            <div class="editor-column" id="editorRight">
              <div class="tabbar" id="tabBarRight" role="tablist" aria-label="Right pane files"></div>
              <nav class="breadcrumb" id="breadcrumbRight" aria-label="File path right"></nav>
              <div class="content-pane" id="contentPaneRight"></div>
            </div>
          </div>
        </main>
      </div>

      <!-- Status bar -->
      <div class="statusbar" role="status">
        <span class="statusbar__item" id="statusFile">No file open</span>
        <span class="statusbar__item" id="statusLang"></span>
        <span class="statusbar__item" style="margin-left:auto">Portfolio Site</span>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
